# Infra services for local dev — all secrets come from Vault at app startup.
# Apps (NestJS, Next.js) run locally with VAULT_ADDR + VAULT_TOKEN in .env.
name: boilers

services:
  # ──────────────────────────────────────────────────────
  # Core (always on)
  # ──────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nest
      POSTGRES_PASSWORD: nest
      POSTGRES_DB: nest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nest -d nest"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-commander:
    image: rediscommander/redis-commander:latest
    profiles: ["tools", "all"]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"

  # ──────────────────────────────────────────────────────
  # Message / task brokers (profile: brokers)
  # ──────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management
    profiles: ["brokers", "all"]
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: nest
      RABBITMQ_DEFAULT_PASS: nest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  nats:
    image: nats:2.10-alpine
    profiles: ["brokers", "all"]
    restart: unless-stopped
    command: ["--jetstream", "--http_port", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  mqtt:
    image: eclipse-mosquitto:2
    profiles: ["brokers", "all"]
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mqttdata:/mosquitto/data

  # ──────────────────────────────────────────────────────
  # Kafka, single-node KRaft (profile: kafka)
  # ──────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    profiles: ["kafka", "all"]
    restart: unless-stopped
    ports:
      - "29092:29092"
    volumes:
      - kafkadata:/var/lib/kafka/data

  # ──────────────────────────────────────────────────────
  # MongoDB for the Mongoose feature (profile: mongo)
  # ──────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    profiles: ["mongo", "all"]
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: nest
      MONGO_INITDB_ROOT_PASSWORD: nest
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  # ──────────────────────────────────────────────────────
  # ELK logging stack
  # ──────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"

  fluent-bit:
    image: fluent/fluent-bit:3.1-debug
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof fluent-bit || exit 1"]
      interval: 5s
      retries: 6
      start_period: 10s
    ports:
      - "24224:24224"
    volumes:
      - ./nest-js-boilerplate/docker/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./nest-js-boilerplate/docker/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./nest-js-boilerplate/docker/fluent-bit/level_name.lua:/fluent-bit/etc/level_name.lua:ro
      - fluentbitstate:/state

  # ──────────────────────────────────────────────────────
  # Mailpit — dev SMTP catcher (profile: mail or all)
  # ──────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    profiles: ["mail", "all"]
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  # ──────────────────────────────────────────────────────
  # Object storage
  # ──────────────────────────────────────────────────────
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-setup:
    image: minio/mc
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/uploads &&
      mc anonymous set download local/uploads &&
      echo 'MinIO bucket ready'"

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  mqttdata:
  kafkadata:
  mongodata:
  esdata:
  fluentbitstate:
  minio_data:
