# Infra services for local dev — secrets fetched from Vault by vault-init.
name: boilers

services:
  # ──────────────────────────────────────────────────────
  # Vault init — fetches secrets for every infra service
  # ──────────────────────────────────────────────────────
  vault-init:
    image: alpine:3.20
    environment:
      VAULT_ADDR: https://vault.eys.gen.tr
      VAULT_TOKEN: ${VAULT_TOKEN:?set VAULT_TOKEN in .env or shell}
    volumes:
      - ./.vault-envs:/secrets
      - ./docker/vault-init/entrypoint.sh:/entrypoint.sh:ro
    command: /entrypoint.sh

  # ──────────────────────────────────────────────────────
  # Core (always on)
  # ──────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
    env_file: ./.vault-envs/postgres.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-commander:
    image: rediscommander/redis-commander:latest
    profiles: ["tools", "all"]
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file: ./.vault-envs/redis-commander.env
    ports:
      - "8081:8081"

  # ──────────────────────────────────────────────────────
  # Message / task brokers (profile: brokers)
  # ──────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management
    profiles: ["brokers", "all"]
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
    env_file: ./.vault-envs/rabbitmq.env
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  nats:
    image: nats:2.10-alpine
    profiles: ["brokers", "all"]
    restart: unless-stopped
    command: ["--jetstream", "--http_port", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  mqtt:
    image: eclipse-mosquitto:2
    profiles: ["brokers", "all"]
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mqttdata:/mosquitto/data

  # ──────────────────────────────────────────────────────
  # Kafka, single-node KRaft (profile: kafka)
  # ──────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    profiles: ["kafka", "all"]
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
    env_file: ./.vault-envs/kafka.env
    volumes:
      - kafkadata:/var/lib/kafka/data
    ports:
      - "29092:29092"

  # ──────────────────────────────────────────────────────
  # MongoDB for the Mongoose feature (profile: mongo)
  # ──────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    profiles: ["mongo", "all"]
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
    env_file: ./.vault-envs/mongo.env
    volumes:
      - mongodata:/data/db
    ports:
      - "27017:27017"

  # ──────────────────────────────────────────────────────
  # Applications
  # ──────────────────────────────────────────────────────
  migrate:
    build:
      context: ./nest-js-boilerplate
      target: migrate
    restart: "no"
    depends_on:
      vault-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file: ./.vault-envs/backend.env

  app:
    build:
      context: ./nest-js-boilerplate
    restart: unless-stopped
    init: true
    depends_on:
      vault-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./.vault-envs/backend.env
    ports:
      - "3000:3000"
      - "5050:5050"

  nextjs:
    build:
      context: ./next-js-boilerplate
      args:
        NEXT_PUBLIC_APP_URL: https://app.eys.gen.tr
        NEXT_PUBLIC_REALTIME_WS_URL: wss://api.eys.gen.tr/ws
        NEXT_PUBLIC_MINIO_PUBLIC_URL: https://app.eys.gen.tr/api
        NEXT_PUBLIC_STRIPE_KEY: pk_test_51TqecDEHhe9HsOpGZsMuC2nADQyBcL4RGqRPiXUi4QgEVO7lwObggH3O4qI59iaTS3whWLomamuhn3f0ABqDjPap00lLAx2q7w
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: BOTFPkWWrBfVO7-bQELkRKrqdKzBQHs7Q7cnf64ZhMqyIz1_49-OWusGQKW8jKMZ-RU6EPJZ3jhn3QmaVo8Qv2c
    restart: unless-stopped
    init: true
    depends_on:
      vault-init:
        condition: service_completed_successfully
      app:
        condition: service_started
    env_file: ./.vault-envs/frontend.env
    ports:
      - "3100:3100"

  # ──────────────────────────────────────────────────────
  # ELK logging stack
  # ──────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
    env_file: ./.vault-envs/elasticsearch.env
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
    env_file: ./.vault-envs/kibana.env
    ports:
      - "5601:5601"

  fluent-bit:
    image: fluent/fluent-bit:3.1-debug
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof fluent-bit || exit 1"]
      interval: 5s
      retries: 6
      start_period: 10s
    ports:
      - "24224:24224"
    volumes:
      - ./nest-js-boilerplate/docker/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./nest-js-boilerplate/docker/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./nest-js-boilerplate/docker/fluent-bit/level_name.lua:/fluent-bit/etc/level_name.lua:ro
      - fluentbitstate:/state

  # ──────────────────────────────────────────────────────
  # Mailpit — dev SMTP catcher (profile: mail or all)
  # ──────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    profiles: ["mail", "all"]
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  # ──────────────────────────────────────────────────────
  # Object storage
  # ──────────────────────────────────────────────────────
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    depends_on:
      vault-init:
        condition: service_completed_successfully
    env_file: ./.vault-envs/minio.env
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-setup:
    image: minio/mc
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    env_file: ./.vault-envs/minio.env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/uploads &&
      mc anonymous set download local/uploads &&
      echo 'MinIO bucket ready'"

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  mqttdata:
  kafkadata:
  mongodata:
  esdata:
  fluentbitstate:
  minio_data:
