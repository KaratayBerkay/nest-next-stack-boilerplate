# Infra services for local dev — secrets fetched from Vault by vault-init.
name: boilers

services:
  # ──────────────────────────────────────────────────────
  # Vault init — fetches secrets for every infra service
  # ──────────────────────────────────────────────────────
  vault-init:
    image: alpine:3.20
    environment:
      VAULT_ADDR: https://vault.eys.gen.tr
      VAULT_TOKEN: ${VAULT_TOKEN:?set VAULT_TOKEN in .env or shell}
    volumes:
      - vault-envs:/secrets
    command: >
      sh -c '
        apk add --no-cache curl jq >/dev/null 2>&1 &&
        for svc in backend elasticsearch frontend kafka kibana minio mongo postgres rabbitmq redis-commander; do
          echo "vault-init: fetching $svc secrets..." &&
          curl -sf -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/secret/data/production/$svc" \
            | jq -r ".data.data | to_entries | .[] | \"\(.key)=\(.value)\"" \
            > "/secrets/$svc.env" &&
          echo "vault-init: wrote /secrets/$svc.env ($(wc -l < /secrets/$svc.env) vars)"
        done
      '

  # ──────────────────────────────────────────────────────
  # Core (always on)
  # ──────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
    env_file: /secrets/postgres.env
    volumes:
      - vault-envs:/secrets:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-commander:
    image: rediscommander/redis-commander:latest
    profiles: ["tools", "all"]
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file: /secrets/redis-commander.env
    volumes:
      - vault-envs:/secrets:ro
    ports:
      - "8081:8081"

  # ──────────────────────────────────────────────────────
  # Message / task brokers (profile: brokers)
  # ──────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management
    profiles: ["brokers", "all"]
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
    env_file: /secrets/rabbitmq.env
    volumes:
      - vault-envs:/secrets:ro
      - rabbitmqdata:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  nats:
    image: nats:2.10-alpine
    profiles: ["brokers", "all"]
    restart: unless-stopped
    command: ["--jetstream", "--http_port", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  mqtt:
    image: eclipse-mosquitto:2
    profiles: ["brokers", "all"]
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mqttdata:/mosquitto/data

  # ──────────────────────────────────────────────────────
  # Kafka, single-node KRaft (profile: kafka)
  # ──────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    profiles: ["kafka", "all"]
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
    env_file: /secrets/kafka.env
    volumes:
      - vault-envs:/secrets:ro
      - kafkadata:/var/lib/kafka/data
    ports:
      - "29092:29092"

  # ──────────────────────────────────────────────────────
  # MongoDB for the Mongoose feature (profile: mongo)
  # ──────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    profiles: ["mongo", "all"]
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
    env_file: /secrets/mongo.env
    volumes:
      - vault-envs:/secrets:ro
      - mongodata:/data/db
    ports:
      - "27017:27017"

  # ──────────────────────────────────────────────────────
  # ELK logging stack
  # ──────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
    env_file: /secrets/elasticsearch.env
    volumes:
      - vault-envs:/secrets:ro
      - esdata:/usr/share/elasticsearch/data
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
    env_file: /secrets/kibana.env
    volumes:
      - vault-envs:/secrets:ro
    ports:
      - "5601:5601"

  fluent-bit:
    image: fluent/fluent-bit:3.1-debug
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof fluent-bit || exit 1"]
      interval: 5s
      retries: 6
      start_period: 10s
    ports:
      - "24224:24224"
    volumes:
      - ./nest-js-boilerplate/docker/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./nest-js-boilerplate/docker/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./nest-js-boilerplate/docker/fluent-bit/level_name.lua:/fluent-bit/etc/level_name.lua:ro
      - fluentbitstate:/state

  # ──────────────────────────────────────────────────────
  # Mailpit — dev SMTP catcher (profile: mail or all)
  # ──────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    profiles: ["mail", "all"]
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  # ──────────────────────────────────────────────────────
  # Object storage
  # ──────────────────────────────────────────────────────
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    depends_on:
      vault-init:
        condition: service_completed_successfully
    env_file: /secrets/minio.env
    volumes:
      - vault-envs:/secrets:ro
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-setup:
    image: minio/mc
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    env_file: /secrets/minio.env
    volumes:
      - vault-envs:/secrets:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/uploads &&
      mc anonymous set download local/uploads &&
      echo 'MinIO bucket ready'"

volumes:
  vault-envs:
  pgdata:
  redisdata:
  rabbitmqdata:
  mqttdata:
  kafkadata:
  mongodata:
  esdata:
  fluentbitstate:
  minio_data:
