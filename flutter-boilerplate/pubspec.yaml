name: flutter_boilerplate
description: Flutter mobile clone of next-js-boilerplate
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: ^3.27.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  go_router: ^17.3.0
  flutter_riverpod: ^3.3.2
  riverpod: ^3.3.2
  dio: ^5.7.0
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.3
  
  intl: ^0.20.2
  logger: ^2.5.0
  equatable: ^2.0.7
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  table_calendar: ^3.1.3
  flutter_stripe: ^13.1.0
  web_socket_channel: ^3.0.2
  connectivity_plus: ^7.3.0
  device_info_plus: ^13.2.0
  firebase_messaging: ^16.4.3
  flutter_local_notifications: ^22.1.0
  reactive_forms: ^18.2.2
  formz: ^0.8.0
  image_picker: ^1.1.2
  file_picker: ^12.0.0-beta.7
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  collection: ^1.19.1
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Regular.ttf
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700
