name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test

      - name: Fallow dead-code
        run: npx fallow dead-code --ci --format json --quiet >> $GITHUB_STEP_SUMMARY || true

      - name: Fallow duplication
        run: npx fallow dupes --ci --format json --quiet >> $GITHUB_STEP_SUMMARY || true

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      # TODO: this job has no backend to talk to — no Postgres/Redis services and no
      # compiled nest-js-boilerplate process, unlike nest-js-boilerplate/.github/workflows/ci.yml's
      # `test` job. The BFF routes this suite drives (login/register/dev-activate) all proxy to
      # APP_URL, which points at nothing here, so this step cannot pass against a real backend as
      # currently configured. Needs: Postgres+Redis services, build+migrate+boot the backend with
      # ALLOW_DEV_ACTIVATE=true, a health-check wait, then run Playwright against it.
      - name: E2E tests
        run: pnpm test:e2e
