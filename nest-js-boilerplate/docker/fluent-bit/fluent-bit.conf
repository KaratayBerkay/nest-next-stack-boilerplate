# Fluent Bit: receives both frontend and backend logs via Docker fluentd log driver.
# Both streams are shipped to Elasticsearch with different indices.
[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

# Receive logs from all containers via Docker fluentd log driver.
[INPUT]
    Name    forward
    Listen  0.0.0.0
    Port    24224

# Docker's fluentd log driver wraps each stdout line as a raw JSON *string* under
# `log` (plus container_id/container_name/source) rather than parsing it — so every
# Pino field (level, category, event, userId, ...) starts out trapped inside that
# string, invisible to any later filter/rule that reads a top-level key. Decode it
# back into real fields using the pino_json parser (parsers.conf) before anything
# downstream tries to read record fields.
[FILTER]
    Name          parser
    Match         *
    Key_Name      log
    Parser        pino_json
    Reserve_Data  On
    Preserve_Key  Off

# Pino emits a numeric `level` (30=info, 50=error). Add a human-readable label for Kibana.
[FILTER]
    Name      lua
    Match     *
    Script    /fluent-bit/etc/level_name.lua
    Call      add_level_name

# Tag backend records with the service name.
[FILTER]
    Name      modify
    Match     app*
    Add       service nest-boilerplate

# Tag frontend records with the service name.
[FILTER]
    Name      modify
    Match     frontend*
    Add       service next-js-boilerplate

# Rewrite tag so structured events (session/exception/page) are routed
# to their own indices. Must run after modify filters above. Matches only
# the raw app/frontend tags (not the rewritten session/exception/page ones)
# so re-emitted records aren't matched a second time.
[FILTER]
    Name          rewrite_tag
    Match         app*
    Rule          $category ^(session|exception|page)$ $1 false
    Emitter_Name  re_emit_app

[FILTER]
    Name          rewrite_tag
    Match         frontend*
    Rule          $category ^(session|exception|page)$ $1 false
    Emitter_Name  re_emit_frontend

[OUTPUT]
    Name                es
    Match               app*
    Host                elasticsearch
    Port                9200
    Index               app-logs
    Suppress_Type_Name  On
    Replace_Dots        On
    Retry_Limit         False

# Tag messaging-ws records with the service name.
[FILTER]
    Name      modify
    Match     messaging-ws*
    Add       service messaging-ws

# Frontend logs go to a separate index for independent lifecycle management.
[OUTPUT]
    Name                es
    Match               frontend*
    Host                elasticsearch
    Port                9200
    Index               frontend-logs
    Suppress_Type_Name  On
    Replace_Dots        On
    Retry_Limit         False

[OUTPUT]
    Name                es
    Match               messaging-ws*
    Host                elasticsearch
    Port                9200
    Index               messaging-logs
    Suppress_Type_Name  On
    Replace_Dots        On
    Retry_Limit         False

# Structured event indices (rewritten tags) — session, exception, page
[OUTPUT]
    Name                es
    Match               session
    Host                elasticsearch
    Port                9200
    Index               session-logs
    Suppress_Type_Name  On
    Replace_Dots        On
    Retry_Limit         False

[OUTPUT]
    Name                es
    Match               exception
    Host                elasticsearch
    Port                9200
    Index               exception-logs
    Suppress_Type_Name  On
    Replace_Dots        On
    Retry_Limit         False

[OUTPUT]
    Name                es
    Match               page
    Host                elasticsearch
    Port                9200
    Index               page-logs
    Suppress_Type_Name  On
    Replace_Dots        On
    Retry_Limit         False
