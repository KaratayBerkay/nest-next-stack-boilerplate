# Fluent Bit: receives frontend logs via Forward protocol and tails backend log file.
# Both streams are shipped to Elasticsearch with different indices.
[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Path              /logs/app.log
    Tag               app.logs
    Parser            pino_json
    Refresh_Interval  5
    Read_from_Head    true
    DB                /state/tail.db

# Receive frontend logs from the Next.js container via Docker fluentd log driver.
[INPUT]
    Name    forward
    Listen  0.0.0.0
    Port    24224

# Pino emits a numeric `level` (30=info, 50=error). Add a human-readable label for Kibana.
[FILTER]
    Name      lua
    Match     *
    Script    /fluent-bit/etc/level_name.lua
    Call      add_level_name

# Tag backend records with the service name.
[FILTER]
    Name      modify
    Match     app.logs
    Add       service nest-boilerplate

# Tag frontend records with the service name.
[FILTER]
    Name      modify
    Match     frontend*
    Add       service next-js-boilerplate

[OUTPUT]
    Name                es
    Match               app.logs
    Host                elasticsearch
    Port                9200
    Index               app-logs
    Suppress_Type_Name  On
    Replace_Dots        On
    Retry_Limit         False

# Frontend logs go to a separate index for independent lifecycle management.
[OUTPUT]
    Name                es
    Match               frontend*
    Host                elasticsearch
    Port                9200
    Index               frontend-logs
    Suppress_Type_Name  On
    Replace_Dots        On
    Retry_Limit         False
