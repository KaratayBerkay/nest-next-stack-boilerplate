# Fluent Bit: receives both frontend and backend logs via Docker fluentd log driver.
# Both streams are shipped to Elasticsearch with different indices.
[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

# Receive logs from all containers via Docker fluentd log driver.
[INPUT]
    Name    forward
    Listen  0.0.0.0
    Port    24224

# Pino emits a numeric `level` (30=info, 50=error). Add a human-readable label for Kibana.
[FILTER]
    Name      lua
    Match     *
    Script    /fluent-bit/etc/level_name.lua
    Call      add_level_name

# Tag backend records with the service name.
[FILTER]
    Name      modify
    Match     app*
    Add       service nest-boilerplate

# Tag frontend records with the service name.
[FILTER]
    Name      modify
    Match     frontend*
    Add       service next-js-boilerplate

[OUTPUT]
    Name                es
    Match               app*
    Host                elasticsearch
    Port                9200
    Index               app-logs
    Suppress_Type_Name  On
    Replace_Dots        On
    Retry_Limit         False

# Tag messaging-ws records with the service name.
[FILTER]
    Name      modify
    Match     messaging-ws*
    Add       service messaging-ws

# Frontend logs go to a separate index for independent lifecycle management.
[OUTPUT]
    Name                es
    Match               frontend*
    Host                elasticsearch
    Port                9200
    Index               frontend-logs
    Suppress_Type_Name  On
    Replace_Dots        On
    Retry_Limit         False

[OUTPUT]
    Name                es
    Match               messaging-ws*
    Host                elasticsearch
    Port                9200
    Index               messaging-logs
    Suppress_Type_Name  On
    Replace_Dots        On
    Retry_Limit         False
