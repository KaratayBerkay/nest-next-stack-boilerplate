# Parse Pino's JSON log lines. Pino is configured (logging.config.ts) to emit ISO timestamps
# under `time`, so Fluent Bit can promote it to the record timestamp (@timestamp in ES).
[PARSER]
    Name         pino_json
    Format       json
    Time_Key     time
    Time_Format  %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep    On
