# EXAMPLE Secret — DO NOT commit real values. Replace placeholders and apply out-of-band, or
# (better) generate from a secrets manager (Sealed Secrets / External Secrets / Vault).
#   kubectl create secret generic nest-boilerplate-secrets \
#     --from-literal=DATABASE_URL='postgresql://user:pass@postgres:5432/app?schema=public' \
#     --from-literal=JWT_SECRET='...' ...
apiVersion: v1
kind: Secret
metadata:
  name: nest-boilerplate-secrets
  labels:
    app.kubernetes.io/name: nest-boilerplate
type: Opaque
stringData:
  # Prisma reads this (prisma.config.ts -> env('DATABASE_URL')). Append &connection_limit=N so
  # replicas × N stays under Postgres max_connections (add PgBouncer when scaling out).
  DATABASE_URL: "postgresql://user:CHANGE_ME@postgres:5432/app?schema=public&connection_limit=10"
  JWT_SECRET: "CHANGE_ME"
  COOKIE_SECRET: "CHANGE_ME"
  CSRF_SECRET: "CHANGE_ME"
  RESEND_API_KEY: "CHANGE_ME"
  # Web Push VAPID private key (public key + subject live in the ConfigMap)
  VAPID_PRIVATE_KEY: "CHANGE_ME"
  # Only if your Redis requires auth:
  # REDIS_PASSWORD: "CHANGE_ME"
