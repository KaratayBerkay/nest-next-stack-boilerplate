# Root monorepo workspace — both apps + shared packages.
# The per-app pnpm-workspace.yaml files still exist for isolated dev.
packages:
  - "nest-js-boilerplate"
  - "next-js-boilerplate"
  - "packages/*"

# Merged build-script approvals from both apps
allowBuilds:
  unrs-resolver: false
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  esbuild: true
  '@apollo/protobufjs': false
  msgpackr-extract: false
  protobufjs: false
  '@suites/di.nestjs': false
  '@suites/doubles.jest': false
  '@scarf/scarf': false
  '@swc/core': false
  better-sqlite3: true
  sqlite3: true
  sharp: true

onlyBuiltDependencies:
  - sharp
  - unrs-resolver
  - better-sqlite3
  - sqlite3
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
  - esbuild
